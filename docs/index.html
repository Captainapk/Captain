<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Business App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://www.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  try {
    var t = localStorage.getItem('theme');
    if (!t) t = (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    if (t === 'light') document.documentElement.classList.add('light');
  } catch(e){}
})();
</script>
<style>
  :root{
    --bg:#0F0D0A; --card:#1B1815; --card2:#231F18; --gold:#C9A227; --gold-soft:#E4C874;
    --ink:#F5EFDD; --muted:#A79A7D; --line:#332D22; --whatsapp:#25D366; --radius:18px;
    --shadow:rgba(0,0,0,.5); --sk1:#211D17; --sk2:#3D3324;
  }
  html.light{
    --bg:#FBF9F3; --card:#FFFFFF; --card2:#F3EEDF; --gold:#A9820D; --gold-soft:#8C6B0F;
    --ink:#211D14; --muted:#847A62; --line:#E6DFC9; --shadow:rgba(120,105,60,.16);
    --sk1:#EFE8D3; --sk2:#FDFBF5;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Public Sans',-apple-system,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  body{transition:background-color .35s ease,color .35s ease}
  h1,h2,h3,.serif{font-family:'Playfair Display',serif}
  a{color:inherit}
  .container{max-width:520px;margin:0 auto;padding:0 18px 90px}

  #demoBanner{display:none;background:var(--gold);color:#1a1608;font-size:12.5px;
    font-weight:700;text-align:center;padding:8px 12px;letter-spacing:.02em}

  header.top{position:relative;overflow:hidden;padding:26px 18px 16px;text-align:center}
  header.top::before{content:'';position:absolute;top:-45%;left:50%;transform:translateX(-50%);
    width:280px;height:280px;background:radial-gradient(circle,rgba(201,162,39,.20),transparent 70%);
    pointer-events:none}
  .themeBtn{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;
    background:var(--card2);border:1px solid var(--line);font-size:15px;display:flex;
    align-items:center;justify-content:center;color:var(--ink);z-index:2;padding:0}
  .themeBtn:active{transform:scale(.92)}
  .logoWrap{position:relative;width:60px;height:60px;border-radius:50%;margin:0 auto 12px;overflow:hidden;
    border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;background:var(--card);z-index:1}
  .logoWrap img{width:100%;height:100%;object-fit:cover}
  .logoWrap .fallback{font-family:'Playfair Display';font-size:22px;color:var(--gold)}
  .logoWrap.hasStatus{cursor:pointer;box-shadow:0 0 0 3px var(--bg),0 0 10px 1px rgba(201,162,39,.4);
    animation:ringGlow 2s ease-in-out infinite}
  @keyframes ringGlow{0%,100%{box-shadow:0 0 0 3px var(--bg),0 0 10px 1px rgba(201,162,39,.4)}
    50%{box-shadow:0 0 0 3px var(--bg),0 0 16px 4px rgba(201,162,39,.75)}}

  .storyOverlay{position:fixed;inset:0;background:#000;z-index:50;display:none;align-items:center;justify-content:center}
  .storyProgress{position:absolute;top:14px;left:14px;right:14px;display:flex;gap:4px;z-index:2}
  .storyProgress .seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
  .storyProgress .seg .fill{height:100%;width:0%;background:#fff}
  .storyClose{position:absolute;top:8px;right:14px;z-index:3;background:rgba(0,0,0,.45);color:#fff;
    border:none;width:34px;height:34px;border-radius:50%;font-size:15px}
  .storyImgWrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .storyImgWrap img{max-width:100%;max-height:100%;object-fit:contain}
  .storyTapZones{position:absolute;inset:0;display:flex;z-index:1}
  .storyTapPrev{flex:1}
  .storyTapNext{flex:2}
  header.top h1{position:relative;z-index:1;font-size:22px;margin:0 0 3px;font-weight:700;letter-spacing:.01em}
  header.top p{position:relative;z-index:1;margin:0;font-size:12.5px;color:var(--muted);letter-spacing:.02em}

  .quickNav{display:flex;gap:8px;padding:14px 18px 4px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line)}
  .quickNav::-webkit-scrollbar{display:none}
  .quickNav a{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--muted);text-decoration:none;
    padding:7px 14px;border-radius:99px;border:1px solid var(--line);white-space:nowrap;
    transition:color .2s ease,border-color .2s ease}
  .quickNav a:active{color:var(--gold);border-color:var(--gold)}

  section{margin-top:30px;scroll-margin-top:14px}
  .sectionHead{display:flex;align-items:baseline;gap:10px;padding:0 18px;margin-bottom:14px}
  .sectionHead h2{font-size:19px;margin:0;font-weight:700}
  .sectionHead .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  .promoScroll{display:flex;gap:12px;overflow-x:auto;padding:2px 18px 6px;
    scroll-snap-type:x proximity;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .promoScroll::-webkit-scrollbar{display:none}
  .promoCard{flex:0 0 auto;width:62%;max-width:240px;aspect-ratio:3/2;scroll-snap-align:start;
    position:relative;border-radius:14px;overflow:hidden;text-decoration:none;display:block;
    background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);
    box-shadow:0 10px 22px -14px var(--shadow);transition:background-color .35s ease,border-color .35s ease}
  .promoCard img{width:100%;height:100%;object-fit:cover;display:block}
  .promoCard .scrim{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(10,9,6,0) 40%,rgba(10,9,6,.92) 100%);
    display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .promoCard .badge{align-self:flex-start;background:var(--gold);color:#1a1608;font-weight:700;
    font-size:10px;letter-spacing:.05em;padding:2px 9px;border-radius:99px;margin-bottom:6px}
  .promoCard h3{font-size:14px;margin:0;color:#F5EFDD;font-weight:700;line-height:1.25}
  .promoCard .tap{font-size:10px;color:var(--gold-soft);font-weight:600;letter-spacing:.03em;margin-top:3px}
  .promoCard.noImg{display:flex;align-items:center;justify-content:center;text-align:center;padding:16px}
  .promoCard.noImg h3{font-size:15px;color:var(--ink)}

  .contact-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:8px;margin:0 18px;box-shadow:0 6px 18px -12px var(--shadow);
    transition:background-color .35s ease,border-color .35s ease}
  .contact-row{display:flex;align-items:center;gap:12px;padding:13px 10px;text-decoration:none;border-radius:12px}
  .contact-row:active{background:var(--card2)}
  .contact-row .icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;font-size:17px;background:var(--card2);border:1px solid var(--line)}
  .contact-row .txt .label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
  .contact-row .txt .val{font-size:14px;font-weight:600;color:var(--ink)}
  .divider{height:1px;background:var(--line);margin:2px 8px}
  .waList{margin:14px 18px 0;display:flex;flex-direction:column;gap:10px}
  .cta-wa{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--whatsapp);
    color:#062b14;font-weight:700;font-size:14.5px;padding:14px;border-radius:14px;text-decoration:none;
    box-shadow:0 6px 18px -6px rgba(37,211,102,.45)}
  .cta-wa:active{transform:scale(.98)}

  .update{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    margin:0 18px 10px;box-shadow:0 6px 18px -12px var(--shadow);transition:background-color .35s ease,border-color .35s ease}
  .update img{width:100%;height:150px;object-fit:cover;display:block}
  .update .body{padding:14px 16px}
  .update .date{font-size:10.5px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .update h3{font-size:15px;margin:4px 0 4px;font-weight:700}
  .update p{font-size:13.5px;color:var(--muted);margin:0;line-height:1.5}

  .skeleton{background:linear-gradient(100deg,var(--sk1) 25%,var(--sk2) 50%,var(--sk1) 75%);
    background-size:300% 100%;animation:shimmer 1.6s ease-in-out infinite,pulse 1.6s ease-in-out infinite}
  @keyframes shimmer{0%{background-position:140% 0}100%{background-position:-40% 0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.88}}
  .sk-card{flex:0 0 auto;width:62%;max-width:240px;aspect-ratio:3/2;border-radius:14px;border:1px solid rgba(201,162,39,.35)}
  .sk-update{height:64px;border-radius:14px;margin:0 18px 10px;border:1px solid rgba(201,162,39,.35)}
  .sk-contact{height:150px;border-radius:var(--radius);margin:0 18px;border:1px solid rgba(201,162,39,.35)}

  .empty{color:var(--muted);font-size:13.5px;padding:18px;text-align:center}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:40px;letter-spacing:.03em}

  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .in{animation:rise .4s ease both}
  @media (prefers-reduced-motion: reduce){.in,.skeleton{animation:none}}
  *:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>

<div id="demoBanner">⚙️ Demo mode — connect Firebase to show your real content (see README)</div>

<header class="top">
  <button class="themeBtn" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">☀️</button>
  <div class="logoWrap" id="logoWrap"><span class="fallback" id="logoFallback">Y</span></div>
  <h1 id="bizName">Your Business</h1>
  <p id="bizTagline">Loading the latest updates &amp; offers…</p>
</header>

<nav class="quickNav">
  <a href="#promosSection">✨ Promotions</a>
  <a href="#contactSection">💬 Get in touch</a>
  <a href="#updatesSection">📰 Updates</a>
</nav>

<div class="container">

  <section id="promosSection">
    <div class="sectionHead"><h2>Promotions</h2><div class="rule"></div></div>
    <div class="promoScroll" id="promosList">
      <div class="promoCard sk-card skeleton"></div>
      <div class="promoCard sk-card skeleton"></div>
    </div>
  </section>

  <section id="contactSection">
    <div class="sectionHead"><h2>Get in touch</h2><div class="rule"></div></div>
    <div class="contact-card" id="contactCard">
      <div class="sk-contact skeleton" style="margin:0"></div>
    </div>
    <div class="waList" id="waList"></div>
  </section>

  <section id="updatesSection">
    <div class="sectionHead"><h2>Updates</h2><div class="rule"></div></div>
    <div id="updatesList">
      <div class="sk-update skeleton"></div>
      <div class="sk-update skeleton"></div>
    </div>
  </section>

  <footer>We usually reply fast — tap anytime.</footer>
</div>

<div class="storyOverlay" id="storyOverlay">
  <div class="storyProgress" id="storyProgress"></div>
  <button class="storyClose" onclick="closeStory()">✕</button>
  <div class="storyImgWrap"><img id="storyImg" src="" alt=""></div>
  <div class="storyTapZones">
    <div class="storyTapPrev" onclick="prevStory()"></div>
    <div class="storyTapNext" onclick="nextStory()"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA0hvHb-Osy79HF42wZDFQRfGGllNiv7tI",
  authDomain: "captain-90263.firebaseapp.com",
  projectId: "captain-90263",
  storageBucket: "captain-90263.firebasestorage.app",
  messagingSenderId: "807801159763",
  appId: "1:807801159763:web:7cb5d7df63d089b59c06a6"
};

const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";
const params = new URLSearchParams(location.search);
const uid = params.get('uid');

const DEMO = {
  business: {
    businessName: "Cedar & Co.", tagline: "Fresh updates from our team", logoUrl: "",
    phone: "+971 4 000 0000", showPhone: true,
    address: "Shop 4, Al Wasl Road, Dubai", hours: "Sat–Thu, 10am–10pm", showAddress: true,
    whatsapps: [{label:"Sales", number:"971500000000"}, {label:"Support", number:"971500000001"}], showWhatsapp: true,
    websites: [{label:"Main site", url:"https://example.com"}], showWebsite: true
  },
  promos: [
    {title:"20% off this weekend", badge:"LIMITED", imageUrl:"", linkUrl:""},
    {title:"Refer a friend, get AED 25", badge:"ONGOING", imageUrl:"", linkUrl:""}
  ],
  updates: [
    {title:"New stock just arrived", body:"We've restocked the items everyone's been asking about.", date:"14 Jul", imageUrl:""},
    {title:"Holiday hours", body:"We'll be closed Friday for a public holiday, back Saturday.", date:"10 Jul", imageUrl:""}
  ],
  status: []
};

function updateThemeIcon(){
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = document.documentElement.classList.contains('light') ? '🌙' : '☀️';
}
function toggleTheme(){
  const isLight = document.documentElement.classList.toggle('light');
  try { localStorage.setItem('theme', isLight ? 'light' : 'dark'); } catch(e){}
  updateThemeIcon();
}
updateThemeIcon();

function normalizeConfig(cfg){
  const out = {...cfg};
  if (!out.whatsapps && out.whatsapp) out.whatsapps = [{label:'', number: out.whatsapp}];
  if (!out.websites && out.website) out.websites = [{label:'', url: out.website}];
  if (out.showPhone === undefined) out.showPhone = !!out.phone;
  if (out.showAddress === undefined) out.showAddress = !!out.address;
  if (out.showWhatsapp === undefined) out.showWhatsapp = !!(out.whatsapps && out.whatsapps.length);
  if (out.showWebsite === undefined) out.showWebsite = !!(out.websites && out.websites.length);
  return out;
}

let db = null;
if (isConfigured) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    db.enablePersistence().catch(()=>{ /* unsupported here, falls back to normal network mode */ });
  }
  catch (e) { console.error('Firebase init failed', e); }
} else {
  document.getElementById('demoBanner').style.display = 'block';
}

function renderBusiness(cfgRaw){
  const cfg = normalizeConfig(cfgRaw);
  document.getElementById('bizName').textContent = cfg.businessName || "Your Business";
  document.getElementById('bizTagline').textContent = cfg.tagline || "Here's what's new";

  const logoWrap = document.getElementById('logoWrap');
  if (cfg.logoUrl) {
    logoWrap.innerHTML = `<img src="${cfg.logoUrl}" alt="">`;
  } else {
    const fb = document.getElementById('logoFallback');
    if (fb) fb.textContent = (cfg.businessName||"Y").charAt(0).toUpperCase();
  }

  const rows = [];
  if (cfg.showPhone && cfg.phone) rows.push(`<a class="contact-row" href="tel:${cfg.phone.replace(/\s/g,'')}">
      <div class="icon">📞</div><div class="txt"><div class="label">Call us</div><div class="val">${cfg.phone}</div></div></a>`);
  if (cfg.showWebsite && cfg.websites && cfg.websites.length){
    cfg.websites.forEach(w=>{
      if (!w.url) return;
      rows.push(`<a class="contact-row" href="${w.url}" target="_blank" rel="noopener">
        <div class="icon">🌐</div><div class="txt"><div class="label">${w.label || 'Website'}</div><div class="val">${w.url.replace(/^https?:\/\//,'')}</div></div></a>`);
    });
  }
  if (cfg.showAddress && cfg.address) rows.push(`<a class="contact-row" href="https://maps.google.com/?q=${encodeURIComponent(cfg.address)}" target="_blank" rel="noopener">
      <div class="icon">📍</div><div class="txt"><div class="label">Visit us</div><div class="val">${cfg.address}${cfg.hours ? ' · '+cfg.hours : ''}</div></div></a>`);
  document.getElementById('contactCard').innerHTML = rows.length
    ? rows.join('<div class="divider"></div>')
    : '<div class="empty">Contact details coming soon</div>';

  const waEl = document.getElementById('waList');
  const validWa = (cfg.showWhatsapp && cfg.whatsapps) ? cfg.whatsapps.filter(w=>w.number) : [];
  if (validWa.length){
    waEl.innerHTML = validWa.map(w=>
      `<a class="cta-wa" href="https://wa.me/${w.number.replace(/[^0-9]/g,'')}" target="_blank" rel="noopener">
        💬 ${w.label ? 'Chat — '+w.label : 'Chat on WhatsApp'}</a>`).join('');
  } else {
    waEl.innerHTML = '';
  }
}

function renderPromos(list){
  const el = document.getElementById('promosList');
  if (!list.length){ el.innerHTML = '<div class="empty">No promotions right now — check back soon.</div>'; stopAutoScroll(); return; }
  el.innerHTML = list.map((p,i)=>{
    const inner = p.imageUrl
      ? `<img src="${p.imageUrl}" alt=""><div class="scrim">${p.badge?`<span class="badge">${p.badge}</span>`:''}<h3>${p.title||''}</h3>${p.linkUrl?'<div class="tap">Tap to view →</div>':''}</div>`
      : `${p.badge?`<span class="badge" style="position:absolute;top:10px;left:10px">${p.badge}</span>`:''}<h3>${p.title||''}</h3>`;
    const tag = p.linkUrl ? 'a' : 'div';
    const href = p.linkUrl ? ` href="${p.linkUrl}" target="_blank" rel="noopener"` : '';
    return `<${tag} class="promoCard${p.imageUrl?'':' noImg'} in" style="animation-delay:${i*70}ms"${href}>${inner}</${tag}>`;
  }).join('');
  setupAutoScroll();
}

let autoScrollTimer = null;
let autoScrollPaused = false;
let autoScrollResumeTimer = null;
let autoScrollIndex = 0;
let autoScrollListenersBound = false;

function stopAutoScroll(){
  clearInterval(autoScrollTimer);
  autoScrollTimer = null;
}

function setupAutoScroll(){
  stopAutoScroll();
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const scrollEl = document.getElementById('promosList');
  const cards = Array.from(scrollEl.querySelectorAll('.promoCard'));
  if (cards.length <= 1) return;

  autoScrollIndex = 0;
  autoScrollTimer = setInterval(()=>{
    if (autoScrollPaused) return;
    autoScrollIndex = (autoScrollIndex + 1) % cards.length;
    cards[autoScrollIndex].scrollIntoView({behavior:'smooth', inline:'start', block:'nearest'});
  }, 2000);

  if (!autoScrollListenersBound){
    const pause = ()=>{ autoScrollPaused = true; clearTimeout(autoScrollResumeTimer); };
    const resume = ()=>{ autoScrollResumeTimer = setTimeout(()=>{ autoScrollPaused = false; }, 3000); };
    scrollEl.addEventListener('touchstart', pause, {passive:true});
    scrollEl.addEventListener('touchend', resume, {passive:true});
    scrollEl.addEventListener('pointerdown', pause);
    scrollEl.addEventListener('pointerup', resume);
    autoScrollListenersBound = true;
  }
}

function renderUpdates(list){
  const el = document.getElementById('updatesList');
  if (!list.length){ el.innerHTML = '<div class="empty">No updates yet.</div>'; return; }
  el.innerHTML = list.map((u,i)=>`
    <div class="update in" style="animation-delay:${i*70}ms">
      ${u.imageUrl ? `<img src="${u.imageUrl}" alt="">` : ''}
      <div class="body">
        <div class="date">${u.date||''}</div>
        <h3>${u.title||''}</h3>
        <p>${u.body||''}</p>
      </div>
    </div>`).join('');
}

function fmtDate(ts){
  try{ const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString(undefined,{day:'numeric',month:'short'});
  }catch(e){ return ''; }
}

async function trackActivity(uid){
  if (!uid || !db) return;
  try{
    const ref = db.collection('installs').doc(uid);
    const snap = await ref.get();
    if (!snap.exists){
      await ref.set({
        installedAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastActiveAt: firebase.firestore.FieldValue.serverTimestamp(),
        platform: 'android'
      });
    } else {
      await ref.update({ lastActiveAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
  }catch(e){ console.error('activity tracking failed', e); }
}

// ---------- Status / stories (auto-expire after 24h, client-side) ----------
let statusList = [];
let storyIndex = 0;
let storyTimer = null;
const STORY_DURATION = 5000;
const STORY_WINDOW_MS = 24 * 60 * 60 * 1000;

function isStatusActive(s){
  const ms = (s.createdAt && s.createdAt.toMillis) ? s.createdAt.toMillis()
    : (typeof s.createdAt === 'number' ? s.createdAt : Date.now());
  return (Date.now() - ms) < STORY_WINDOW_MS;
}

function updateLogoRing(){
  const wrap = document.getElementById('logoWrap');
  if (statusList.length){
    wrap.classList.add('hasStatus');
    wrap.onclick = openStory;
  } else {
    wrap.classList.remove('hasStatus');
    wrap.onclick = null;
  }
}

async function loadStatus(){
  if (!db) { statusList = []; updateLogoRing(); return; }
  try{
    const snap = await db.collection('status').orderBy('createdAt','desc').get();
    statusList = snap.docs.map(d=>d.data()).filter(isStatusActive);
  }catch(e){ statusList = []; }
  updateLogoRing();
}

function openStory(){
  if (!statusList.length) return;
  storyIndex = 0;
  document.getElementById('storyProgress').innerHTML =
    statusList.map(()=>'<div class="seg"><div class="fill"></div></div>').join('');
  showStory(0);
  document.getElementById('storyOverlay').style.display = 'flex';
}
function showStory(i){
  clearTimeout(storyTimer);
  const segs = document.querySelectorAll('#storyProgress .seg');
  segs.forEach((s,idx)=>{
    const fill = s.querySelector('.fill');
    fill.style.transition = 'none';
    fill.style.width = idx < i ? '100%' : '0%';
  });
  document.getElementById('storyImg').src = statusList[i].imageUrl;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const fill = segs[i].querySelector('.fill');
      fill.style.transition = `width ${STORY_DURATION}ms linear`;
      fill.style.width = '100%';
    });
  });
  storyTimer = setTimeout(nextStory, STORY_DURATION);
}
function nextStory(){
  if (storyIndex < statusList.length - 1){ storyIndex++; showStory(storyIndex); }
  else { closeStory(); }
}
function prevStory(){
  if (storyIndex > 0){ storyIndex--; showStory(storyIndex); }
}
function closeStory(){
  clearTimeout(storyTimer);
  document.getElementById('storyOverlay').style.display = 'none';
}

async function loadLive(){
  trackActivity(uid);
  loadStatus();

  // Instant paint from local cache if this device has opened the app before.
  // First-ever open has nothing cached yet, so this quietly does nothing and
  // the skeleton stays visible until the network fetch below completes.
  try{
    const [cfgC, promoC, upC] = await Promise.all([
      db.collection('config').doc('business').get({source:'cache'}),
      db.collection('promotions').where('active','==',true).get({source:'cache'}),
      db.collection('updates').orderBy('createdAt','desc').limit(10).get({source:'cache'})
    ]);
    if (cfgC.exists) renderBusiness(cfgC.data());
    if (!promoC.empty) renderPromos(promoC.docs.map(d=>d.data()));
    if (!upC.empty) renderUpdates(upC.docs.map(d=>{
      const u = d.data();
      return {...u, date: u.createdAt ? fmtDate(u.createdAt) : ''};
    }));
  }catch(e){ /* nothing cached yet — that's fine */ }

  // Always refresh from the server too, and update anything that changed.
  const [cfgRes, promoRes, upRes] = await Promise.allSettled([
    db.collection('config').doc('business').get(),
    db.collection('promotions').where('active','==',true).get(),
    db.collection('updates').orderBy('createdAt','desc').limit(10).get()
  ]);

  if (cfgRes.status === 'fulfilled') {
    renderBusiness(cfgRes.value.exists ? cfgRes.value.data() : DEMO.business);
  } else { renderBusiness(DEMO.business); }

  if (promoRes.status === 'fulfilled') {
    renderPromos(promoRes.value.docs.map(d=>d.data()));
  } else { renderPromos([]); }

  if (upRes.status === 'fulfilled') {
    const updates = upRes.value.docs.map(d=>{
      const u = d.data();
      return {...u, date: u.createdAt ? fmtDate(u.createdAt) : ''};
    });
    renderUpdates(updates);
  } else { renderUpdates([]); }
}

function loadDemo(){
  renderBusiness(DEMO.business);
  renderPromos(DEMO.promos);
  renderUpdates(DEMO.updates);
  statusList = DEMO.status.filter(isStatusActive);
  updateLogoRing();
}

if (isConfigured && db) { loadLive(); } else { loadDemo(); }
